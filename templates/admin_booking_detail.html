{% extends 'base.html' %}
{% block content %}
  <h2>Buchung #{{ booking.id }}</h2>
  <p>User: {{ booking.user_id }}</p>
  <p>Requested: {{ booking.requested_start }} — {{ booking.requested_end }}</p>
  <p>Status: {{ booking.status }}</p>
  <form method="post">
    <label>Finaler Ort</label>
    <select name="confirmed_location">
      <option value="">--</option>
      {% for loc in locations %}
        <option value="{{ loc.id }}" {% if booking.confirmed_location_id==loc.id %}selected{% endif %}>{{ loc.name }}</option>
      {% endfor %}
    </select>
    <button name="action" value="confirm">Bestätigen</button>
    <button name="action" value="reject">Ablehnen</button>
  </form>
{% endblock %}
