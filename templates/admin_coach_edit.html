{% extends 'base.html' %}
{% block content %}
  <div class="dashboard-header">
    <h2>✏️ Coach bearbeiten: {{ coach.name }}</h2>
    <div class="cta-buttons">
      <a href="{{ url_for('admin_coaches') }}" class="btn btn-secondary">← Zurück</a>
    </div>
  </div>

  <section class="admin-section" style="max-width:700px;">
    <form method="POST" class="booking-form">
      <div class="form-row">
        <div class="form-group">
          <label for="first_name">Vorname</label>
          <input type="text" id="first_name" name="first_name" value="{{ coach.first_name or '' }}">
        </div>
        <div class="form-group">
          <label for="last_name">Nachname</label>
          <input type="text" id="last_name" name="last_name" value="{{ coach.last_name or '' }}">
        </div>
      </div>
      <div class="form-group">
        <label>Anzeigename</label>
        <input type="text" value="{{ coach.name }}" disabled style="opacity:0.6;">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="email">E-Mail</label>
          <input type="email" id="email" name="email" value="{{ coach.email or '' }}">
        </div>
        <div class="form-group">
          <label for="specialization">Spezialisierung</label>
          <input type="text" id="specialization" name="specialization" value="{{ coach.specialization or '' }}" placeholder="z.B. Kraul, Brustschwimmen">
        </div>
      </div>
      <div class="form-group">
        <label for="cities_served">Einsatzorte (kommasepariert)</label>
        <input type="text" id="cities_served" name="cities_served" value="{{ coach.cities_served or '' }}" placeholder="z.B. Berlin, Potsdam, Hamburg">
      </div>
      <div class="form-group">
        <label for="title">Titel</label>
        <input type="text" id="title" name="title" value="{{ coach.title or '' }}">
      </div>
      <div class="form-group">
        <label for="bio">Bio</label>
        <textarea id="bio" name="bio" rows="4">{{ coach.bio or '' }}</textarea>
      </div>
      <div class="form-group">
        <label for="strengths">Stärken</label>
        <textarea id="strengths" name="strengths" rows="3">{{ coach.strengths or '' }}</textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="swim_style">Trainingsansatz</label>
          <textarea id="swim_style" name="swim_style" rows="2">{{ coach.swim_style or '' }}</textarea>
        </div>
        <div class="form-group">
          <label for="experience">Erfahrung</label>
          <textarea id="experience" name="experience" rows="2">{{ coach.experience or '' }}</textarea>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="image_url">Profilbild-URL</label>
          <input type="url" id="image_url" name="image_url" value="{{ coach.image_url or '' }}">
        </div>
        <div class="form-group">
          <label for="external_profile_url">Externer Link</label>
          <input type="url" id="external_profile_url" name="external_profile_url" value="{{ coach.external_profile_url or '' }}">
        </div>
      </div>
      <div class="form-group">
        <label>
          <input type="checkbox" name="is_active" value="1" {{ 'checked' if coach.is_active }}>
          Aktiv (auf Coaches-Seite sichtbar)
        </label>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">💾 Speichern</button>
        <a href="{{ url_for('admin_coaches') }}" class="btn btn-secondary">Abbrechen</a>
      </div>
    </form>
  </section>
{% endblock %}
